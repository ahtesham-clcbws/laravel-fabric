<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Laravel Fabric Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #4F46E5;
    }
    .markdown-section {
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div id="app">Loading Fabric Documentation...</div>
  <script>
    window.$docsify = {
      name: 'Laravel Fabric',
      logo: 'art/fabric_logo_main_primary.png',
      repo: 'ahtesham-clcbws/laravel-fabric',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md' // Fix for infinite loading in sub-directories
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search Documentation...',
        noData: 'No Results Found',
        depth: 6
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
